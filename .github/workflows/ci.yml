name: CI

on:
  pull_request:
  workflow_call: {} # lets release.yml reuse this exact CI

# Read-only is enough for CI. When called by release.yml, a reusable workflow can
# request at most the permissions its caller grants, so keeping this minimal here
# keeps the reused CI job read-only; release.yml grants more only on its own
# publish job.
permissions:
  contents: read

jobs:
  cli:
    name: CLI typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          # corepack provisions pnpm; skip setup-node's auto pnpm cache,
          # which would invoke pnpm before corepack enable puts it on PATH.
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ichintansoni/skills-master typecheck
      - run: pnpm --filter @ichintansoni/skills-master test

  content:
    name: Lint skills + registry drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          # corepack provisions pnpm; skip setup-node's auto pnpm cache,
          # which would invoke pnpm before corepack enable puts it on PATH.
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # Validate every skill (names, descriptions, pairs_with integrity, body cap, headings).
      - run: pnpm --filter @ichintansoni/skills-master exec tsx src/bin.ts lint --content ../../skills
      # Fail if the committed registry.json is stale.
      - run: pnpm --filter @ichintansoni/skills-master exec tsx src/bin.ts registry build --content ../../skills --check
