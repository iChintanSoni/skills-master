name: Crawl (staleness report)

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  crawl:
    name: Coverage + staleness + upstream snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # Report-only: produces coverage/staleness/upstream reports. Never edits skills.
      - run: pnpm exec tsx scripts/crawl/bin.ts --fetch
      - uses: actions/upload-artifact@v5
        with:
          name: crawl-reports
          path: scripts/crawl/reports/
