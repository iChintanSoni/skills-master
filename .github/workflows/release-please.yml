name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # The publish job calls the reusable release.yml, whose job requests
  # id-token: write (npm provenance/OIDC). A reusable workflow can't hold more
  # permission than its caller, and GitHub checks this at startup — before the
  # job's `if` is evaluated — so this must be granted here even though publish
  # only runs when a release is actually created.
  id-token: write

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # config-file / manifest-file default to release-please-config.json
          # and .release-please-manifest.json at the repo root.

  publish:
    name: Publish released version
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
