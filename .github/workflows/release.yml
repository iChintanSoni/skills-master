name: Release

on:
  push:
    tags:
      - "v*"
  # Invoked by release-please.yml when a Release PR is merged. Keeping the tag
  # trigger above lets us do the one-time bootstrap publish and manual releases.
  workflow_call:

jobs:
  publish:
    name: Publish CLI + build marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          # corepack provisions pnpm; skip setup-node's auto pnpm cache,
          # which would invoke pnpm before corepack enable puts it on PATH.
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter skills-master test
      - run: pnpm --filter skills-master build
      # Regenerate the Claude marketplace from the skill tree and attach it.
      - run: pnpm --filter skills-master exec tsx src/bin.ts marketplace build --content ../../skills --out ../..
      - uses: actions/upload-artifact@v7
        with:
          name: claude-marketplace
          path: |
            .claude-plugin/
            plugins/
      # This job only runs on an intentional tag push or a release-please
      # release, so publishing is always the desired outcome here.
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter skills-master publish --no-git-checks --access public
