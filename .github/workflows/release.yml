name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish CLI + build marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter skills-master test
      - run: pnpm --filter skills-master build
      # Regenerate the Claude marketplace from the skill tree and attach it.
      - run: pnpm --filter skills-master exec tsx src/bin.ts marketplace build --content ../../skills --out ../..
      - uses: actions/upload-artifact@v5
        with:
          name: claude-marketplace
          path: |
            .claude-plugin/
            plugins/
      # Publishes only when an NPM_TOKEN secret is configured.
      - if: ${{ env.NPM_TOKEN != '' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter skills-master publish --no-git-checks --access public
