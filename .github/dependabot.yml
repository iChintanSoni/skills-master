version: 2
updates:
  # JavaScript/TypeScript dependencies across the pnpm workspace. pnpm keeps a
  # single root lockfile, so one entry at "/" covers the root and packages/*.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Routine minor/patch bumps arrive as a single PR to cut noise; major
      # bumps stay on their own so they get individual review (e.g. vitest 4).
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Action versions pinned in .github/workflows (actions/checkout, setup-node,
  # upload-artifact, release-please, …).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
